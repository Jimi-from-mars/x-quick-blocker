<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #0f1419;
    }
    
    .info {
      background: #eff3f4;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
      color: #536471;
      line-height: 1.6;
    }
    
    .info strong {
      color: #0f1419;
    }
    
    .feature {
      display: flex;
      align-items: start;
      margin-bottom: 8px;
    }
    
    .feature-icon {
      margin-right: 8px;
      font-size: 16px;
    }
    
    .warning {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      color: #856404;
      margin-top: 10px;
    }
    
    .note {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      color: #2e7d32;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>X Quick Block</h2>
  
  <div class="info">
    <div class="feature">
      <span class="feature-icon">🎯</span>
      <div>
        <strong>使用方法：</strong><br>
        按住 <strong>Ctrl</strong> 键（Mac用户按 <strong>Command</strong>），点击任意推文
      </div>
    </div>
  </div>
  
  <div class="note">
    <strong>✓ 真实屏蔽：</strong>插件会模拟手动操作，将用户添加到X官方屏蔽列表中，所有设备同步生效！
  </div>
  
  <div class="warning">
    <strong>⚠️ 注意：</strong>
    <ul style="margin: 5px 0; padding-left: 20px;">
      <li>屏蔽操作不可批量撤销</li>
      <li>如果屏蔽失败，请尝试手动操作</li>
      <li>操作过快可能被X限制</li>
    </ul>
  </div>
  
  <div class="info" style="margin-top: 15px; text-align: center;">
    <div style="font-size: 12px; color: #536471;">
      管理已屏蔽用户请访问：<br>
      <a href="https://x.com/settings/blocked/all" target="_blank" style="color: #1d9bf0;">
        x.com/settings/blocked/all
      </a>
    </div>
  </div>
</body>
</html>
